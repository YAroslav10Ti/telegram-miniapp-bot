
<!DOCTYPE html> 
<html lang="ru"> 
<head> 
    

    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    
    
    <title>Мое Первое Mini App</title>
    
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    
    <link rel="stylesheet" href="style.css">
    
</head> 
<body> 
    

    <div class="container"> 
        
        
        <header>
            <h1> Мое Первое Mini App</h1> <!-- Главный заголовок -->
            <p>Это веб-приложение работает внутри Telegram</p> <!-- Подзаголовок -->
        </header>
        
        <main>
            
            <div class="card">
                <h2>Привет, друг! </h2> 
                <p>Ты успешно создал свое первое Telegram Mini App</p> 
            </div>
            

            <div class="card">
                <h2>Что это такое?</h2>
                <p>Mini App - это веб-приложение, которое запускается прямо внутри Telegram</p>
            </div>
            
            <button id="demo-button" class="primary-button">Нажми меня!</button>

            <div id="result" class="result-area"></div>

        </main> 
        
        <footer>
            <p>Создано для обучения</p> 
        </footer>
        
    </div> 
    
    <script src="app.js"></script>
